services:
  api:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.api
    container_name: repo-api
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.web
      args:
        API_ORIGIN: http://api:3001
    container_name: repo-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
