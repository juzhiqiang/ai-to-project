version: "3.8"

services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: repo-api
    ports:
      - "3001:3001"
    healthcheck:
      test: \["CMD", "wget", "-qO-",
        "[http://localhost:3001/health](http://localhost:3001/health)"\]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    container_name: repo-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
