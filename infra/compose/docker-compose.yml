version: '3.8'

services:
  api:
    image: oven/bun:latest
    working_dir: /app/services/api
    volumes:
      - ../../:/app
    ports:
      - "3001:3001"
    command: bun run dev
    environment:
      - NODE_ENV=development

  web:
    image: oven/bun:latest
    working_dir: /app/clients/web
    volumes:
      - ../../:/app
    ports:
      - "3000:3000"
    command: bun run dev
    environment:
      - NODE_ENV=development
    depends_on:
      - api
